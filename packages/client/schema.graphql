  conversations(filter: ConversationFilterInput): [Conversation!]

  """List inquiries visible to the current user"""
  inquiries(filter: InquiryFilterInput): [Inquiry!]

  """Fetch a single inquiry by ID"""
  inquiry(inquiryId: ID!): Inquiry
  marketplaceItem(itemId: ID!): MarketplaceItem
  marketplaceItems(filter: MarketplaceItemFilterInput): [MarketplaceItem!]

  """Get the currently authenticated user"""
  me: User
  messages(conversationId: ID!, limit: Int, offset: Int): [ConversationMessage!]
  myMarketplaceItems: [MarketplaceItem!]

  """Get the current renter profile"""
  myProfile: Renter
  myRoommateProfile: RoommateProfile
  myServiceRequests: [ServiceRequest!]

  """List subscriptions for the current agent or owner"""
  mySubscriptions: [AgentSubscription!]

  """List notifications for the current user"""
  notifications(filter: NotificationFilterInput): [Notification!]
  professionalApplications(filter: AgentApplicationFilterInput): [AgentApplication!]

  """List properties with filtering"""
  properties(filter: PropertyFilterInput): [Property!]

  """Fetch a property by slug"""
  property(slug: String!): Property

  """Return aggregate property analytics"""
  propertyAnalytics(propertyId: ID!): PropertyAnalytics

  """List boosts for a property"""
  propertyBoosts(propertyId: ID!): [ListingBoost!]

  """Fetch the buy detail for a property"""
  propertyBuyDetail(propertyId: ID!): BuyDetail

  """List media for a property"""
  propertyMedia(propertyId: ID!): [PropertyMedia!]

  """List property price history entries"""
  propertyPriceHistory(propertyId: ID!): [PriceHistory!]

  """Fetch the rent detail for a property"""
  propertyRentDetail(propertyId: ID!): RentDetail

  """List reviews for a property"""
  propertyReviews(propertyId: ID!): [Review!]

  """Search properties with text, structured, and geo filters"""
  propertySearch(filter: PropertySearchInput): [Property!]

  """Fetch the sell detail for a property"""
  propertySellDetail(propertyId: ID!): SellDetail

  """Fetch sell price history for a property"""
  propertySellPriceHistory(propertyId: ID!): [PriceHistory!]

  """Get a renter profile by ID — admin or self"""
  renter(id: ID!): Renter

  """Get all renter profiles — admin only"""
  renters(search: RenterSearchInput): [Renter!]

  """List reports for moderation"""
  reports(filter: ReportFilterInput): [Report!]
  roommateProfile(profileId: ID!): RoommateProfile
  roommateProfiles(filter: RoommateProfileFilterInput): [RoommateProfile!]
  savedMarketplaceItems: [MarketplaceSavedItem!]

  """List saved properties for the current user"""
  savedProperties: [SavedProperty!]
  savedRoommateProfiles: [RoommateSavedProfile!]

  """List saved searches for the current user"""
  savedSearches: [SavedSearch!]
  serviceListing(listingId: ID!): ServiceListing
  serviceListings(filter: ServiceListingFilterInput): [ServiceListing!]
  serviceProvider(providerId: ID!): ServiceProvider
  serviceProviders(filter: ServiceProviderFilterInput): [ServiceProvider!]

  """Find similar published properties"""
  similarProperties(limit: Int, propertyId: ID!): [Property!]
  staticPage(pageId: ID!): StaticPage
  staticPageBySlug(slug: String!): StaticPage
  staticPages(filter: StaticPageFilterInput): [StaticPage!]

  """List available subscription plans"""
  subscriptionPlans: [SubscriptionPlan!]

  """Get a user by ID — admin only"""
  user(id: ID!): User

  """Get all users — admin only"""
  users(search: UserSearchInput): [User!]

  """Fetch a single viewing by ID"""
  viewing(viewingId: ID!): Viewing

  """List viewings visible to the current user"""
  viewings(filter: ViewingFilterInput): [Viewing!]
}

